version: "3"

# library:*/component:* delegate tasks are defined explicitly below (not via
# Task's `includes:` feature) so their command body is a literal,
# checker-comparable `./lifecycle.sh <verb>` call identical to the justfile
# wrapper recipes of the same name - `includes:` only ever exposes the child
# Taskfile's task *names* to this parent, with no comparable body text.

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install all dependencies
    cmds:
      - task: library:setup
      - task: component:setup

  build:
    desc: Build the WASM component
    cmds:
      - task: component:build

  test:
    desc: Run all tests
    cmds:
      - task: library:test
      - task: component:test

  lint:
    desc: Run all formatter, lint, and dependency-audit gates
    cmds:
      - task: library:lint
      - task: component:lint

  coverage:
    desc: Run all tests with coverage
    cmds:
      - task: library:coverage
      - task: component:coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - task: library:clean
      - task: component:clean
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: library:purge
      - task: component:purge
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate lockfiles
    cmds:
      - task: library:update
      - task: component:update

  library:setup:
    cmds: [./lifecycle.sh library-setup]
  library:test:
    cmds: [./lifecycle.sh library-test]
  library:lint:
    cmds: [./lifecycle.sh library-lint]
  library:coverage:
    cmds: [./lifecycle.sh library-coverage]
  library:clean:
    cmds: [./lifecycle.sh library-clean]
  library:purge:
    cmds: [./lifecycle.sh library-purge]
  library:update:
    cmds: [./lifecycle.sh library-update]

  component:setup:
    cmds: [./lifecycle.sh component-setup]
  component:build:
    cmds: [./lifecycle.sh component-build]
  component:test:
    cmds: [./lifecycle.sh component-test]
  component:lint:
    cmds: [./lifecycle.sh component-lint]
  component:coverage:
    cmds: [./lifecycle.sh component-coverage]
  component:clean:
    cmds: [./lifecycle.sh component-clean]
  component:purge:
    cmds: [./lifecycle.sh component-purge]
  component:update:
    cmds: [./lifecycle.sh component-update]

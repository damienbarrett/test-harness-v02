version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install test harness dependencies
    cmds:
      - ./lifecycle.sh setup

  test:
    desc: Run test harness self-checks
    cmds:
      - ./lifecycle.sh test

  lint:
    desc: Check formatting (ruff format) and lint (ruff check)
    cmds:
      - ./lifecycle.sh lint

  check-runners:
    desc: Check Taskfile.yml and justfile parity
    cmds:
      - ./lifecycle.sh check-runners

  check-contracts:
    desc: Validate common/ contract suites before any component is invoked
    cmds:
      - ./lifecycle.sh check-contracts

  check-shell:
    desc: ShellCheck every tracked shell script in the repository
    cmds:
      - ./lifecycle.sh check-shell

  coverage:
    desc: Run test harness coverage checks
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate the lockfile
    cmds:
      - ./lifecycle.sh update

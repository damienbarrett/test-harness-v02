version: "3"

vars:
  UV_CACHE_DIR:
    sh: printf '%s' "${UV_CACHE_DIR:-.cache/uv}"
  WIT_DIR: "../../common/wit"
  OUTPUT_WASM: "task-component.wasm"
  BINDINGS_DIR: "bindings"

env:
  UV_CACHE_DIR: "{{.UV_CACHE_DIR}}"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - uv sync --locked --extra build --extra test

  build:
    desc: Build the WASM component
    # Emits the wit-bindgen-generated `wit_world` package to `bindings/` (a
    # stable, gitignored location) so host tests can import the real bindings
    # instead of mocking them. `componentize` then bundles src + bindings.
    sources:
      - src/app.py
      - "{{.WIT_DIR}}/tasks.wit"
    generates:
      - "{{.OUTPUT_WASM}}"
      # Sentinel: forces a rebuild if the bindings dir was wiped (e.g.,
      # `task clean`) so host tests don't load with stale or missing bindings.
      - "{{.BINDINGS_DIR}}/wit_world/__init__.py"
    cmds:
      - rm -rf {{.BINDINGS_DIR}}
      - >-
        uv run --locked --extra build componentize-py
        -d {{.WIT_DIR}} -w task-component bindings {{.BINDINGS_DIR}}
      - >-
        uv run --locked --extra build componentize-py
        -d {{.WIT_DIR}} -w task-component componentize
        -p src -p {{.BINDINGS_DIR}} -s -o {{.OUTPUT_WASM}} app

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - uv run --locked --extra test pytest tests/ -v

  coverage:
    desc: Run tests with coverage (builds first)
    deps: [build]
    cmds:
      - uv run --locked --extra test pytest tests/ --cov --cov-report=term-missing

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf __pycache__ .pytest_cache .coverage htmlcov output tests/__pycache__ {{.BINDINGS_DIR}} {{.OUTPUT_WASM}}

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf .venv

version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - ./lifecycle.sh setup

  build:
    desc: Build the WASM components (one per WIT world)
    sources:
      - src/**/*.rs
      - new-world-parser/src/**/*.rs
      - ../../common/wit/tasks.wit
      - ../../common/wit/html-parser.wit
    generates:
      - task-component.wasm
      - new-world-parser.wasm
    cmds:
      - ./lifecycle.sh build

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - ./lifecycle.sh test

  lint:
    desc: Check formatting and lint with warnings denied (builds first - bindings.rs is generated)
    deps: [build]
    cmds:
      - ./lifecycle.sh lint

  coverage:
    desc: Run tests with coverage (100% threshold)
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate the lockfile
    cmds:
      - ./lifecycle.sh update

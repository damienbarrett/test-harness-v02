version: "3"

vars:
  UV_CACHE_DIR:
    sh: printf '%s' "${UV_CACHE_DIR:-.cache/uv}"

env:
  UV_CACHE_DIR: "{{.UV_CACHE_DIR}}"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install test harness dependencies
    cmds:
      - uv sync --locked

  test:
    desc: Run test harness self-checks
    cmds:
      - uv run --locked pytest -q

  check-runners:
    desc: Check Taskfile.yml and justfile parity
    cmds:
      - ./check-runner-parity.py

  check-contracts:
    desc: Validate common/ contract suites before any component is invoked
    cmds:
      - ./check-contracts.py

  coverage:
    desc: Run test harness coverage checks
    cmds:
      - uv run --locked pytest --cov=harness --cov-report=term-missing --cov-fail-under=100

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf __pycache__ .pytest_cache .coverage htmlcov output src/harness/__pycache__ tests/__pycache__

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf .venv

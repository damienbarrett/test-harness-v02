version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - ./lifecycle.sh setup

  build:
    desc: Build the WASM component
    # Emits the wit-bindgen-generated `wit_world` package to `bindings/` (a
    # stable, gitignored location) so host tests can import the real bindings
    # instead of mocking them. `componentize` then bundles src + bindings.
    sources:
      - src/app.py
      - ../../common/wit/tasks.wit
    generates:
      - task-component.wasm
      # Sentinel: forces a rebuild if the bindings dir was wiped (e.g.,
      # `task clean`) so host tests don't load with stale or missing bindings.
      - bindings/wit_world/__init__.py
    cmds:
      - ./lifecycle.sh build

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - ./lifecycle.sh test

  lint:
    desc: Check formatting (ruff format) and lint (ruff check)
    cmds:
      - ./lifecycle.sh lint

  coverage:
    desc: Run tests with coverage (builds first)
    deps: [build]
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate the lockfile
    cmds:
      - ./lifecycle.sh update

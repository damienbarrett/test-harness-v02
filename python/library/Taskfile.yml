version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - ./lifecycle.sh setup

  test:
    desc: Run tests
    cmds:
      - ./lifecycle.sh test

  lint:
    desc: Check formatting (ruff format) and lint (ruff check)
    cmds:
      - ./lifecycle.sh lint

  coverage:
    desc: Run tests with coverage
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate the lockfile
    cmds:
      - ./lifecycle.sh update

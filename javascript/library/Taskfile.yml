version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install npm dependencies (Playwright comes from the Nix flake)
    cmds:
      - ./lifecycle.sh setup

  test:
    desc: Run contract tests across Node, Bun, Deno, Chromium, and WebKit
    cmds:
      - ./lifecycle.sh test

  lint:
    desc: Check formatting (prettier), lint (eslint, incl. ../test-support), and audit dependencies
    cmds:
      - ./lifecycle.sh lint

  coverage:
    desc: Run runtime matrix plus Node coverage (100% threshold)
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - ./lifecycle.sh purge

  update:
    desc: Upgrade locked dependencies and regenerate the lockfile
    cmds:
      - ./lifecycle.sh update

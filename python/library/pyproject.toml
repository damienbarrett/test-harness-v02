[project]
name = "tasks"
version = "0.1.0"
description = "Task entity operations"
requires-python = ">=3.10"

[project.optional-dependencies]
test = [
    "jsonschema>=4.0.0",
    "pytest",
    "pytest-cov>=7.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tasks"]

[tool.coverage.run]
include = ["src/tasks/*"]

[tool.coverage.report]
fail_under = 100
show_missing = true
skip_covered = false

version: "3"

vars:
  TOOL_PATH:
    sh: printf '%s' "$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
  UV_CACHE_DIR:
    sh: printf '%s' "${UV_CACHE_DIR:-.cache/uv}"

env:
  PATH: "{{.TOOL_PATH}}"
  UV_CACHE_DIR: "{{.UV_CACHE_DIR}}"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - uv sync --locked --extra test

  test:
    desc: Run tests
    cmds:
      - uv run --locked --extra test pytest tests/ -v

  coverage:
    desc: Run tests with coverage
    cmds:
      - uv run --locked --extra test pytest tests/ --cov --cov-report=term-missing

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - rm -rf __pycache__ .pytest_cache .coverage htmlcov output tests/__pycache__ src/tasks/__pycache__
      - find . -name '*.egg-info' -exec rm -rf {} + 2>/dev/null || true

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
      - rm -rf .venv

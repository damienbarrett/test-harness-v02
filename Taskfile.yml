version: "3"

includes:
  python:
    taskfile: python/Taskfile.yml
    dir: python
  javascript:
    taskfile: javascript/Taskfile.yml
    dir: javascript
  rust:
    taskfile: rust/Taskfile.yml
    dir: rust
  test-harness:
    taskfile: test-harness/Taskfile.yml
    dir: test-harness

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install all dependencies
    cmds:
      - task: python:setup
      - task: javascript:setup
      - task: rust:setup
      - task: test-harness:setup

  test:
    desc: Run all tests
    cmds:
      - task: python:test
      - task: javascript:test
      - task: rust:test
      - task: test-harness:test

  coverage:
    desc: Run all tests with coverage
    cmds:
      - task: python:coverage
      - task: javascript:coverage
      - task: rust:coverage
      - task: test-harness:coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - task: python:clean
      - task: javascript:clean
      - task: rust:clean
      - task: test-harness:clean
      - rm -rf .output output

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: python:purge
      - task: javascript:purge
      - task: rust:purge
      - task: test-harness:purge
      - rm -rf .output output

  wasm:test:
    desc: Run unified WASM contract tests across all implementations
    cmds:
      - UV_CACHE_DIR="${UV_CACHE_DIR:-test-harness/.cache/uv}" ./test-harness/run-wasm-tests.py

  check:runners:
    desc: Check Taskfile.yml and justfile parity
    cmds:
      - UV_CACHE_DIR="${UV_CACHE_DIR:-test-harness/.cache/uv}" ./test-harness/check-runner-parity.py

  image:bootstrap:
    desc: Install container/image tools in the current checked-out repo environment
    cmds:
      - ./container/bootstrap-container-tools.sh

  image:setup:
    desc: Install all dependencies in the current checked-out repo environment
    cmds:
      - task: setup

  image:test:
    desc: Run all tests in the current checked-out repo environment
    cmds:
      - task: test

  image:coverage:
    desc: Run all coverage checks in the current checked-out repo environment
    cmds:
      - task: coverage

  image:clean:
    desc: Remove generated outputs in the current checked-out repo environment
    cmds:
      - task: clean

  image:purge:
    desc: Remove generated outputs and setup artifacts in the current checked-out repo environment
    cmds:
      - task: purge

  host:container:build:
    desc: Host step - build an Apple container image containing this checkout
    cmds:
      - ./container/container-build.sh

  host:container:shell:
    desc: Host step - open a shell in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-shell.sh

  host:container:task:
    desc: Host step - run an arbitrary task command in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-run.sh 'task {{.CLI_ARGS}}'

  host:container:just:
    desc: Host step - run an arbitrary just command in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-run.sh 'just {{.CLI_ARGS}}'

  host:container:test:
    desc: Host step - run setup and tests in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-run.sh './container/container-suite.sh both test'

  host:container:coverage:
    desc: Host step - run setup and coverage in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-run.sh './container/container-suite.sh both coverage'

  host:container:purge:
    desc: Host step - purge generated outputs and setup artifacts in the source-containing Apple container image without a host bind mount
    cmds:
      - CODEX_HARNESS_IMAGE="${CODEX_HARNESS_IMAGE:-codex-harness:arm64}" CODEX_HARNESS_WORKSPACE_MODE=image ./container/container-run.sh './container/container-suite.sh both purge'

  container:healthcheck:
    desc: Host step - check Apple container runtime and the selected harness image
    cmds:
      - ./container/container-healthcheck.sh

  container:pull:
    desc: Host step - pull the Codex universal image for native Apple silicon
    cmds:
      - ./container/container-pull.sh

  container:build:
    desc: Host step - build the source-containing harness image
    cmds:
      - ./container/container-build.sh

  container:shell:
    desc: Host step - open an interactive shell in the selected image with the host checkout bind-mounted
    cmds:
      - ./container/container-shell.sh

  container:task:
    desc: Host step - run an arbitrary task command with the host checkout bind-mounted
    cmds:
      - ./container/container-run.sh 'task {{.CLI_ARGS}}'

  container:just:
    desc: Host step - run an arbitrary just command with the host checkout bind-mounted
    cmds:
      - ./container/container-run.sh 'just {{.CLI_ARGS}}'

  container:task:setup:
    desc: Run task setup inside the selected harness image
    cmds:
      - ./container/container-run.sh 'task setup'

  container:task:test:
    desc: Run task setup and test inside the selected harness image
    cmds:
      - ./container/container-run.sh './container/container-suite.sh task test'

  container:task:coverage:
    desc: Run task setup and coverage inside the selected harness image
    cmds:
      - ./container/container-run.sh './container/container-suite.sh task coverage'

  container:task:clean:
    desc: Run task clean inside the selected harness image
    cmds:
      - ./container/container-run.sh 'task clean'

  container:task:purge:
    desc: Run task purge inside the selected harness image
    cmds:
      - ./container/container-run.sh 'task purge'

  container:just:setup:
    desc: Run just setup inside the selected harness image
    cmds:
      - ./container/container-run.sh 'just setup'

  container:just:test:
    desc: Run just setup and test inside the selected harness image
    cmds:
      - ./container/container-run.sh './container/container-suite.sh just test'

  container:just:coverage:
    desc: Run just setup and coverage inside the selected harness image
    cmds:
      - ./container/container-run.sh './container/container-suite.sh just coverage'

  container:just:clean:
    desc: Run just clean inside the selected harness image
    cmds:
      - ./container/container-run.sh 'just clean'

  container:just:purge:
    desc: Run just purge inside the selected harness image
    cmds:
      - ./container/container-run.sh 'just purge'

  container:setup:
    desc: Run both task setup and just setup inside one container
    cmds:
      - ./container/container-run.sh './container/container-suite.sh both setup'

  container:test:
    desc: Run both task and just setup/test inside one container
    cmds:
      - ./container/container-run.sh './container/container-suite.sh both test'

  container:coverage:
    desc: Run both task and just setup/coverage inside one container
    cmds:
      - ./container/container-run.sh './container/container-suite.sh both coverage'

  container:clean:
    desc: Run both task clean and just clean inside one container
    cmds:
      - ./container/container-run.sh './container/container-suite.sh both clean'

  container:purge:
    desc: Run both task purge and just purge inside one container
    cmds:
      - ./container/container-run.sh './container/container-suite.sh both purge'

version: "3"

tasks:
  default:
    cmds:
      - task --list
    silent: true

  setup:
    desc: Install dependencies
    cmds:
      - ./lifecycle.sh setup

  build:
    desc: Build the WASM component
    sources:
      - src/**/*.rs
      - ../../common/wit/tasks.wit
    generates:
      - task-component.wasm
    cmds:
      - ./lifecycle.sh build

  test:
    desc: Run tests (builds first)
    deps: [build]
    cmds:
      - ./lifecycle.sh test

  coverage:
    desc: Run tests with coverage (100% threshold)
    cmds:
      - ./lifecycle.sh coverage

  clean:
    desc: Remove generated outputs while preserving dependency state
    cmds:
      - ./lifecycle.sh clean

  purge:
    desc: Remove generated outputs and setup artifacts
    cmds:
      - task: clean
